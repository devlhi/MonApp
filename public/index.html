<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AppMon · Network Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/app.css" />
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 12h4l3 8 4-16 3 8h4" />
          </svg>
        </div>
        <div class="brand-text">
          <span class="brand-name">AppMon</span>
          <span class="brand-sub">network watch</span>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-item active" data-view="dashboard">
          <svg viewBox="0 0 24 24" class="ico"><rect x="3" y="3" width="7" height="9"/><rect x="14" y="3" width="7" height="5"/><rect x="14" y="12" width="7" height="9"/><rect x="3" y="16" width="7" height="5"/></svg>
          <span>Dashboard</span>
        </button>
        <button class="nav-item" data-view="targets">
          <svg viewBox="0 0 24 24" class="ico"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.5"/></svg>
          <span>Monitors</span>
        </button>
        <button class="nav-item" data-view="devices">
          <svg viewBox="0 0 24 24" class="ico"><rect x="2" y="6" width="20" height="5" rx="1"/><rect x="2" y="13" width="20" height="5" rx="1"/><circle cx="6" cy="8.5" r="0.6"/><circle cx="6" cy="15.5" r="0.6"/></svg>
          <span>Devices</span>
        </button>
        <button class="nav-item" data-view="events">
          <svg viewBox="0 0 24 24" class="ico"><path d="M12 2v6m0 8v6M4.9 4.9l4.2 4.2m5.8 5.8l4.2 4.2M2 12h6m8 0h6"/></svg>
          <span>Events</span>
        </button>
      </nav>

      <div class="sidebar-foot">
        <div class="conn" id="connStatus">
          <span class="dot"></span><span class="conn-text">connecting…</span>
        </div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title" id="pageTitle">Dashboard</h1>
          <p class="page-sub" id="pageSub">Live network status</p>
        </div>
        <div class="topbar-actions">
          <div class="clock" id="clock">--:--:--</div>
          <button class="btn btn-primary" id="addBtn">
            <svg viewBox="0 0 24 24" class="ico-sm"><path d="M12 5v14M5 12h14"/></svg>
            <span id="addBtnLabel">Add Monitor</span>
          </button>
        </div>
      </header>

      <section class="content" id="content"><!-- views injected here --></section>
    </main>
  </div>

  <!-- Modal host -->
  <div class="modal-backdrop" id="modalBackdrop" hidden>
    <div class="modal" id="modal"></div>
  </div>

  <!-- Toasts -->
  <div class="toasts" id="toasts"></div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="/js/app.js"></script>
</body>
</html>
